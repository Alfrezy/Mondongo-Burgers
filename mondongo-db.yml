apiVersion: apps/v1
kind: Deployment
metadata:
  name: mondongo-web-app
spec:
  replicas: 2 # ¡Aquí sí podemos meter varias réplicas para alta disponibilidad!
  selector:
    matchLabels:
      app: mondongo-web
  template:
    metadata:
      labels:
        app: mondongo-web
    spec:
      containers:
        - name: web-app
          image: mondongo-app:1.0 # <-- Cambiado de latest a 1.0 para asegurar el rastreo local
          imagePullPolicy: IfNotPresent # <-- K8s usará la imagen de tu PC sin bloquearse buscando en internet
          ports:
            - containerPort: 5000 # El puerto donde corre tu backend de Python
          env:
            - name: DB_HOST
              value: "host.docker.internal" # <-- Dirección mágica para conectar con el Postgres de tu Windows
            - name: DB_PORT
              value: "5432"
            # Jalamos las credenciales seguras directamente de tu Secret de Kubernetes
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          
          # == AQUÍ SE MONTA TU IMAGEN DE REZE DENTRO DEL CONTENEDOR ==
          volumeMounts:
            - name: llave-volumen
              mountPath: /app/SegurityKey # Coincide exactamente con tu carpeta con "g"
              readOnly: true
      
      # == DECLARAMOS EL VOLUMEN QUE JALA DESDE EL CONFIGMAP ==
      volumes:
        - name: llave-volumen
          configMap:
            name: reze-key-config

---
# El puente de red para ver tu aplicación desde el navegador en Windows
apiVersion: v1
kind: Service
metadata:
  name: mondongo-web-service
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001 # Podrás entrar desde tu navegador a http://localhost:30001
  selector:
    app: mondongo-web